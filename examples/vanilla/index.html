<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particular Vanilla Example</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b1020;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      #particles {
        position: fixed;
        inset: 0;
      }
      .hint {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        user-select: none;
        text-align: center;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <canvas id="particles"></canvas>
    <div class="hint">
      <h1>Click anywhere</h1>
      <p>Standalone embed using `particular.global.js`</p>
    </div>

    <script src="../../dist/particular.global.js"></script>
    <script>
      const { createParticles, presets } = window.Particular;

      const canvas = document.getElementById("particles");
      const particles = createParticles({
        canvas,
        preset: "magic",
        renderer: "webgl",
        config: {
          ...presets.magic,
          pixelRatio: Math.min(window.devicePixelRatio || 1, 2),
          maxCount: 500,
        },
      });

      particles.attachClickBurst(document, presets.magic);
    </script>
  </body>
</html>
